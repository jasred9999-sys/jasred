<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Support | SwiftShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-flex">
            <a href="index.html" class="logo">SwiftShop</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="contact.html" style="color: var(--primary)">Support</a></li>
                <li><a href="cart.html">Cart 🛒</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;">
            <div>
                <h1>Contact Support</h1>
                <p style="margin: 1rem 0;">Typically responds in 2 hours.</p>
                <form onsubmit="event.preventDefault(); alert('Message Sent!');" style="display: flex; flex-direction: column; gap: 1rem;">
                    <input type="text" placeholder="Your Name" style="padding: 1rem; border-radius: 8px; border: 1px solid #ddd;">
                    <input type="email" placeholder="Email" style="padding: 1rem; border-radius: 8px; border: 1px solid #ddd;">
                    <textarea placeholder="How can we help?" rows="5" style="padding: 1rem; border-radius: 8px; border: 1px solid #ddd;"></textarea>
                    <button class="btn btn-primary">Send Message</button>
                </form>
            </div>
            <div>
                <h2>Frequently Asked Questions</h2>
                <div style="margin-top: 2rem;">
                    <details style="margin-bottom: 1rem; border-bottom: 1px solid #ddd; padding-bottom: 1rem;">
                        <summary style="font-weight: bold; cursor: pointer;">Do you ship worldwide?</summary>
                        <p style="margin-top: 10px;">Yes, we ship to over 50 countries with tracked delivery.</p>
                    </details>
                    <details style="margin-bottom: 1rem; border-bottom: 1px solid #ddd; padding-bottom: 1rem;">
                        <summary style="font-weight: bold; cursor: pointer;">What is the return policy?</summary>
                        <p style="margin-top: 10px;">You can return any item within 30 days of purchase.</p>
                    </details>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
