<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart | SwiftShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-flex">
            <a href="index.html" class="logo">SwiftShop</a>
            <a href="products.html" style="text-decoration: none;">← Back to Shop</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem;">
        <div style="background: white; padding: 2rem; border-radius: 12px; box-shadow: var(--shadow);">
            <h1>Your Shopping Cart</h1>
            <div id="cartList" style="margin: 2rem 0;"></div>
            <hr>
            <div style="display: flex; justify-content: space-between; padding: 2rem 0;">
                <h2>Total:</h2>
                <h2 id="totalPrice" style="color: var(--primary);">$0.00</h2>
            </div>
            <button class="btn btn-primary" style="width: 100%; padding: 1.5rem;" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const list = document.getElementById('cartList');
            let total = 0;
            list.innerHTML = cart.length ? "" : "Your cart is empty.";
            
            cart.forEach((item, i) => {
                total += item.price;
                list.innerHTML += `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 1rem;">
                        <span>${item.name}</span>
                        <span>$${item.price} <button onclick="remove(${i})" style="color: red; border: none; background: none; cursor: pointer; margin-left: 10px;">Remove</button></span>
                    </div>`;
            });
            document.getElementById('totalPrice').innerText = "$" + total;
        }

        function remove(i) {
            let cart = JSON.parse(localStorage.getItem('cart'));
            cart.splice(i, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function checkout() { alert("Order Placed Successfully!"); localStorage.clear(); location.reload(); }
        renderCart();
    </script>
</body>
</html>
